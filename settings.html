<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengaturan - Somnio</title>
<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.sidebar{
    min-height:100vh;
    background:white;
    border-right:1px solid #ddd;
}

.logo{
    font-size:24px;
    font-weight:bold;
    padding:20px;
    border-bottom:1px solid #eee;
}

.sidebar .nav-link{
    color:#444;
    padding:12px 18px;
    margin:5px 10px;
    border-radius:10px;
}

.sidebar .active{
    background:#0d6efd;
    color:white !important;
}

.card-box{
    background:white;
    border:none;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-lg-2 sidebar p-0">

<div class="logo">
🌙 SOMNIO
</div>

<ul class="nav flex-column mt-3">

<li><a class="nav-link" href="dashboard.html">🏠 Dashboard</a></li>

<li><a class="nav-link" href="sleep-form.html">📝 Input Data</a></li>

<li><a class="nav-link" href="history.html">📖 Riwayat Tidur</a></li>

<li><a class="nav-link" href="statistics.html">📊 Statistik</a></li>

<li><a class="nav-link" href="reminder.html">🔔 Pengingat</a></li>

<li><a class="nav-link" href="tips.html">💡 Tips</a></li>

<li><a class="nav-link active" href="settings.html">⚙ Pengaturan</a></li>

</ul>

</div>

<!-- CONTENT -->

<div class="col-lg-10 p-4">

<h3 class="mb-4">
Pengaturan Akun
</h3>

<div class="card card-box p-4">

<div class="mb-3">

<label class="form-label">
Nama Pengguna
</label>

<input
type="text"
id="username"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Password Baru
</label>

<input
type="password"
id="password"
class="form-control">

</div>

<button
class="btn btn-primary"
onclick="simpanPengaturan()">

Simpan Perubahan

</button>

<hr>

<h5 class="mt-4">
Manajemen Data
</h5>

<button
class="btn btn-warning me-2"
onclick="resetData()">

Reset Data Tidur

</button>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</div>

</div>

</div>

<script>

document.getElementById("username").value =
localStorage.getItem("somnioUser") || "";

function simpanPengaturan(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

localStorage.setItem(
"somnioUser",
username
);

if(password !== ""){

localStorage.setItem(
"somnioPassword",
password
);

}

alert(
"Perubahan berhasil disimpan"
);

}

function resetData(){

if(confirm("Hapus seluruh data tidur?")){

localStorage.removeItem(
"sleepData"
);

alert(
"Data berhasil dihapus"
);

}

}

function logout(){

localStorage.removeItem(
"somnioUser"
);

window.location.href =
"login.html";

}

</script>
<script src="js/script.js"></script>

</body>
</html>
