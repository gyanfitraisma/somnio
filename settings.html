<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengaturan - Somnio</title>
<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb; /* Mengatur warna latar belakang halaman dashboard */
}

/* Mengatur tata letak dan pembatas komponen sidebar di sebelah kiri */
.sidebar{
    min-height:100vh;
    background:white;
    border-right:1px solid #ddd;
}

/* Mengatur tampilan komponen logo aplikasi di dalam sidebar */
.logo{
    font-size:24px;
    font-weight:bold;
    padding:20px;
    border-bottom:1px solid #eee;
}

/* Mengatur gaya menu link navigasi di dalam komponen sidebar */
.sidebar .nav-link{
    color:#444;
    padding:12px 18px;
    margin:5px 10px;
    border-radius:10px;
}

/* Memberikan warna latar belakang penanda biru pada menu navigasi yang sedang aktif */
.sidebar .active{
    background:#0d6efd;
    color:white !important;
}

/* Mengatur bentuk visual kartu penampung konten (box-panel) */
.card-box{
    background:white;
    border:none;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.08); /* Memberikan bayangan halus di sekeliling kartu */
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-lg-2 sidebar p-0">

<div class="logo">
🌙 SOMNIO
</div>

<ul class="nav flex-column mt-3">

<li><a class="nav-link" href="dashboard.html">🏠 Dashboard</a></li>

<li><a class="nav-link" href="sleep-form.html">📝 Input Data</a></li>

<li><a class="nav-link" href="history.html">📖 Riwayat Tidur</a></li>

<li><a class="nav-link" href="statistics.html">📊 Statistik</a></li>

<li><a class="nav-link" href="reminder.html">🔔 Pengingat</a></li>

<li><a class="nav-link" href="tips.html">💡 Tips</a></li>

<li><a class="nav-link active" href="settings.html">⚙ Pengaturan</a></li>

</ul>

</div>

<div class="col-lg-10 p-4">

<h3 class="mb-4">
Pengaturan Akun
</h3>

<div class="card card-box p-4">

<div class="mb-3">

<label class="form-label">
Nama Pengguna
</label>

<input
type="text"
id="username"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Password Baru
</label>

<input
type="password"
id="password"
class="form-control">

</div>

<button
class="btn btn-primary"
onclick="simpanPengaturan()">

Simpan Perubahan

</button>

<hr>

<h5 class="mt-4">
Manajemen Data
</h5>

<button
class="btn btn-warning me-2"
onclick="resetData()">

Reset Data Tidur

</button>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</div>

</div>

</div>

<script>

// Otomatis menampilkan nama user yang sedang aktif ke dalam input text saat halaman dimuat
document.getElementById("username").value =
localStorage.getItem("somnioUser") || "";

// FUNGSI: Menyimpan perubahan nama profil dan kata sandi baru ke Web Storage
function simpanPengaturan(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

// Memperbarui nama pengguna aktif di penyimpanan lokal
localStorage.setItem(
"somnioUser",
username
);

// Validasi kondisional: Hanya simpan kata sandi baru jika kolom input tidak kosong
if(password !== ""){

    localStorage.setItem(
    "somnioPassword",
    password
    );

}

// Menampilkan pesan pop-up konfirmasi keberhasilan aksi simpan
alert(
"Perubahan berhasil disimpan"
);

}

// FUNGSI: Mengosongkan data riwayat tidur yang tersimpan pada memori browser
function resetData(){

// Menampilkan kotak dialog konfirmasi (Yes/No) sebelum eksekusi hapus dilakukan
if(confirm("Hapus seluruh data tidur?")){

    // Menghapus item key data tidur dari penyimpanan lokal browser
    localStorage.removeItem(
    "sleepData"
    );

    // Notifikasi sukses setelah data dibersihkan
    alert(
    "Data berhasil dihapus"
    );

}

}

// FUNGSI: Mengakhiri sesi pengguna saat ini dan keluar dari aplikasi
function logout(){

// Menghapus token string nama pengguna untuk merestart status login
localStorage.removeItem(
"somnioUser"
);

// Mengalihkan secara otomatis ke halaman autentikasi login utama
window.location.href =
"login.html";

}

</script>
<script src="js/script.js"></script>

</body>
</html>
