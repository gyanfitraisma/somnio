/* Mengatur tata letak dan pembatas komponen sidebar di sebelah kiri */

    background:white;
    border-right:1px solid #ddd;

/* Mengatur tampilan komponen logo aplikasi di dalam sidebar */

    font-size:24px;
    font-weight:bold;
    padding:20px;
    border-bottom:1px solid #eee;
}

/* Mengatur gaya menu link navigasi di dalam komponen sidebar */

    color:#444;
    padding:12px 18px;
    margin:5px 10px;
    border-radius:10px;
}

/* Memberikan warna latar belakang penanda biru pada menu navigasi yang sedang aktif */

    background:#0d6efd;
    color:white !important;
}

/* Mengatur bentuk visual kartu penampung konten (box-panel) */
.card-box{
    background:white;
    border:none;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.08); /* Memberikan bayangan halus di sekeliling kartu */
}

</style>

<div class="col-lg-10 p-4">

<h3 class="mb-4">
Pengingat Tidur
</h3>

<div class="card card-box p-4">

<form id="reminderForm">

<div class="row">

<div class="col-md-6">

<label class="form-label">
Jam Tidur
</label>

<input
type="time"
id="sleepTime"
class="form-control"
required>

</div>

</div>

<button
type="submit"
class="btn btn-primary mt-4">

Simpan Pengingat

</button>

</form>

<hr>

<div id="savedReminder">

Belum ada pengingat.

</div>

</div>

</div>

</div>

</div>

<script>

// Mengambil nama user aktif dari memori lokal browser
const user =
localStorage.getItem("somnioUser");

// Memuat data objek konfigurasi pengingat spesifik milik user tersebut jika ada
const reminder =
JSON.parse(
localStorage.getItem(`reminder_${user}`)
);

// Kondisional: Jika data pengingat ditemukan, cetak ke dalam wadah status pengingat
if(reminder){

document.getElementById("savedReminder")
.innerHTML =

`
<h5>Pengingat Aktif</h5>

<p>
Jam Tidur :
<b>${reminder.sleepTime}</b>
</p>
`;

}

// Event Listener: Mengontrol proses saat tombol simpan ditekan oleh user
document.getElementById("reminderForm")
.addEventListener("submit",function(e){

e.preventDefault(); // Menghentikan perilaku bawaan reload otomatis halaman web

// Membungkus nilai input jam ke dalam satu kesatuan objek data
const data = {

sleepTime:
document.getElementById("sleepTime").value

};

// Menyimpan atau menimpa konfigurasi objek pengingat ke dalam Web Storage browser
localStorage.setItem(
`reminder_${user}`,
JSON.stringify(data)
);

// Memberikan notifikasi pesan pop-up sukses kepada pengguna
alert(
"Pengingat berhasil disimpan"
);

// Melakukan penyegaran halaman untuk memperbarui status cetakan teks pengingat aktif terbaru
location.reload();

});

</script>
<script src="js/script.js"></script>
