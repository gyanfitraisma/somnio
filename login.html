<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Somnio</title>
<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:450px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.logo{
    font-size:35px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="text-center mb-4">

<div class="logo">🌙</div>

<h2 class="fw-bold">
SOMNIO
</h2>

<p class="text-muted">
Smart Sleep Monitoring Platform
</p>

</div>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">
Nama Pengguna
</label>

<input
type="text"
id="username"
class="form-control"
placeholder="Masukkan nama Anda"
required>

</div>

<div class="mb-4">

<label class="form-label">
Password
</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Masukkan password"
required>

</div>

<button
type="submit"
class="btn btn-primary w-100">

Masuk

</button>

</form>

<div class="text-center mt-3">

<a href="index.html">
← Kembali ke Beranda
</a>

</div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e){

e.preventDefault();

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(username.trim() === ""){

alert("Nama tidak boleh kosong");

return;

}

if(password.trim() === ""){

alert("Password tidak boleh kosong");

return;

}

localStorage.setItem(
"somnioUser",
username
);

window.location.href =
"dashboard.html";

});

</script>
<script src="js/script.js"></script>

</body>
</html>
