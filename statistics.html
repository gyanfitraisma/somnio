<div class="col-lg-10 p-4">

<h3 class="mb-4">
Statistik Tidur
</h3>

<div class="row g-4">

<div class="col-md-4">

<div class="card card-box p-4">

<h6>Total Data Tidur</h6>

<h2 id="totalData">
0
</h2>

</div>

</div>

<div class="col-md-4">

<div class="card card-box p-4">

<h6>Rata-rata Kualitas</h6>

<h2 id="avgQuality">
0%
</h2>

</div>

</div>

<div class="col-md-4">

<div class="card card-box p-4">

<h6>Rata-rata Durasi</h6>

<h2 id="avgDuration">
0 Jam
</h2>

</div>

</div>

</div>

<div class="card card-box p-4 mt-4">

<h5 class="mb-4">
Grafik Kualitas Tidur
</h5>

<canvas id="statsChart"></canvas>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const user =
localStorage.getItem("somnioUser");

const sleepData =
JSON.parse(
localStorage.getItem(`sleepData_${user}`)
) || [];

document.getElementById("totalData")
.innerHTML = sleepData.length;

let totalQuality = 0;

sleepData.forEach(item => {

totalQuality +=
Number(item.kualitas);

});

let avgQuality = 0;

if(sleepData.length > 0){

avgQuality =
(
totalQuality /
sleepData.length
).toFixed(1);

}

document.getElementById("avgQuality")
.innerHTML =
avgQuality + "%";

/* HITUNG DURASI */

let totalMinutes = 0;

sleepData.forEach(item => {

const tidur =
item.jamTidur.split(":");

const bangun =
item.jamBangun.split(":");

let start =
(Number(tidur[0]) * 60)
+
Number(tidur[1]);

let end =
(Number(bangun[0]) * 60)
+
Number(bangun[1]);

if(end < start){

end += 24 * 60;

}

totalMinutes +=
(end - start);

});

let avgMinutes = 0;

if(sleepData.length > 0){

avgMinutes =
Math.round(
totalMinutes /
sleepData.length
);

}

document.getElementById("avgDuration")
.innerHTML =
(avgMinutes/60).toFixed(1)
+
" Jam";

/* GRAFIK */

const labels =
sleepData.map(
item => item.tanggal
);

const kualitas =
sleepData.map(
item => item.kualitas
);

const ctx =
document.getElementById("statsChart");

if(sleepData.length === 0){

ctx.parentElement.innerHTML +=
`
<div class="alert alert-warning mt-3">
Belum ada data tidur.
</div>
`;

}else{

new Chart(ctx, {

type:'bar',

data:{

labels:labels,

datasets:[{

label:'Kualitas Tidur (%)',

data:kualitas,

borderWidth:1

}]

},

options:{
responsive:true
}

});

}

</script>
<script src="js/script.js"></script>

</body>
