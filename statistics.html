    background:#f5f7fb; /* Mengatur warna latar belakang halaman dashboard */

    border-bottom:1px solid #eee;

/* Mengatur gaya menu link navigasi di dalam komponen sidebar */

    background:white;
    border:none;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.08); /* Memberikan bayangan halus di sekeliling kartu */
}

<div class="row">

<div class="col-lg-2 sidebar p-0">

<div class="logo">

<div class="col-lg-10 p-4">

<h3 class="mb-4">
Statistik Tidur
</h3>

<div class="row g-4">

<div class="col-md-4">

<div class="card card-box p-4">

<h6>Total Data Tidur</h6>

<h2 id="totalData">
0
</h2>

</div>

</div>

<div class="col-md-4">

<div class="card card-box p-4">

<h6>Rata-rata Kualitas</h6>

<h2 id="avgQuality">
0%
</h2>

</div>

</div>

<div class="col-md-4">

<div class="card card-box p-4">

<h6>Rata-rata Durasi</h6>

<h2 id="avgDuration">
0 Jam
</h2>

</div>

</div>

</div>

<div class="card card-box p-4 mt-4">

<h5 class="mb-4">
Grafik Kualitas Tidur
</h5>

<canvas id="statsChart"></canvas>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// Mendapatkan identitas pengguna aktif dari penyimpanan lokal browser
const user =
localStorage.getItem("somnioUser");

// Memuat array data riwayat tidur spesifik milik user tersebut (jika kosong, buat array baru `[]`)
const sleepData =
JSON.parse(
localStorage.getItem(`sleepData_${user}`)
) || [];

// 1. HITUNG TOTAL DATA: Mencetak total panjang index array ke dalam elemen HTML
document.getElementById("totalData")
.innerHTML = sleepData.length;

// 2. HITUNG RATA-RATA KUALITAS TIDUR
let totalQuality = 0;

// Melakukan looping untuk mengakumulasikan seluruh nilai kualitas tidur yang ada
sleepData.forEach(item => {

totalQuality +=
Number(item.kualitas);

});

let avgQuality = 0;

// Validasi pembagian agar tidak menghasilkan error NaN jika array kosong
if(sleepData.length > 0){

avgQuality =
(
totalQuality /
sleepData.length
).toFixed(1); // Mengunci angka desimal hanya 1 angka di belakang koma (contoh: 85.5)

}

// Mencetak hasil kalkulasi rata-rata kualitas ke elemen HTML terkait
document.getElementById("avgQuality")
.innerHTML =
avgQuality + "%";

/* 3. HITUNG RATA-RATA DURASI TIDUR */

let totalMinutes = 0;

// Melakukan iterasi untuk menghitung selisih waktu tidur per entri data
sleepData.forEach(item => {

// Memisahkan string waktu "HH:MM" menjadi komponen Jam dan Menit terpisah
const tidur =
item.jamTidur.split(":");

const bangun =
item.jamBangun.split(":");

// Mengonversi masing-masing komponen waktu menjadi satuan menit total
let start =
(Number(tidur[0]) * 60) + Number(tidur[1]);

let end =
(Number(bangun[0]) * 60) + Number(bangun[1]);

// Logika Kondisional: Menyesuaikan waktu jika jam bangun melewati tengah malam (lewat pukul 00:00)
if(end < start){

end += 24 * 60; // Ditambahkan durasi 24 jam dalam format menit

}

// Mengakumulasikan selisih menit tidur harian ke total menit keseluruhan
totalMinutes +=
(end - start);

});

let avgMinutes = 0;

// Memastikan pembagian durasi rata-rata hanya berjalan jika data tidak kosong
if(sleepData.length > 0){

avgMinutes =
Math.round(
totalMinutes /
sleepData.length
); // Melakukan pembulatan bilangan bulat terdekat

}

// Mengonversi total menit rata-rata kembali ke format desimal jam (dibagi 60) lalu dicetak
document.getElementById("avgDuration")
.innerHTML =
(avgMinutes/60).toFixed(1) + " Jam";

/* 4. RENDER VISUALISASI GRAFIK BAR CHART */

// Mengekstrak tanggal entri menjadi array baru sebagai label sumbu X grafik
const labels =
sleepData.map(
item => item.tanggal
);

// Mengekstrak skor kualitas menjadi array baru sebagai nilai sumbu Y grafik
const kualitas =
sleepData.map(
item => item.kualitas
);

const ctx =
document.getElementById("statsChart");

// Kondisional Grafik: Jika data kosong, tampilkan pesan peringatan Bootstrap alert
if(sleepData.length === 0){

ctx.parentElement.innerHTML +=
`
<div class="alert alert-warning mt-3">
Belum ada data tidur.
</div>
`;

}else{

// Inisialisasi pembuatan objek grafik batang menggunakan pustaka Chart.js
new Chart(ctx, {

type:'bar', // Menentukan jenis grafik berupa grafik batang (Bar Chart)

data:{

labels:labels, // Memasukkan array label tanggal ke sumbu horisontal

datasets:[{

label:'Kualitas Tidur (%)', // Judul keterangan dataset grafik

data:kualitas, // Memasukkan array skor kualitas ke tinggi batang

borderWidth:1 // Mengatur ketebalan garis tepi batang grafik

}]

},

options:{
responsive:true // Memastikan dimensi grafik dapat menyesuaikan lebar layar secara dinamis
}

});

}

</script>
<script src="js/script.js"></script>

</body>
