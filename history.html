<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

/* Pengaturan visual untuk kolom menu samping (Sidebar) */
.sidebar{
    min-height:100vh; /* Memastikan sidebar memenuhi tinggi layar penuh */
    background:white;
    border-right:1px solid #ddd;
}

.logo{
    font-size:24px;
    font-weight:bold;
    padding:20px;
    border-bottom:1px solid #eee;
}

/* Styling untuk link navigasi di dalam sidebar */
.sidebar .nav-link{
    color:#444;
    padding:12px 18px;
    margin:5px 10px;
    border-radius:10px;
}

/* Penanda visual untuk halaman navigasi yang sedang aktif */
.sidebar .active{
    background:#0d6efd;
    color:white !important;
}

/* Kotak putih latar belakang untuk tabel data */
.card-box{
    background:white;
    border:none;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-lg-2 sidebar p-0">

<div class="logo">
🌙 SOMNIO
</div>

<ul class="nav flex-column mt-3">

<li>
<a class="nav-link" href="dashboard.html">
🏠 Dashboard
</a>
</li>

<li>
<a class="nav-link" href="sleep-form.html">
📝 Input Data
</a>
</li>

<li>
<a class="nav-link active" href="history.html">
📖 Riwayat Tidur
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="statistics.html">
📊 Statistik
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="reminder.html">
🔔 Pengingat
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="tips.html">
💡 Tips
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="settings.html">
⚙ Pengaturan
</a>
</li>

</ul>

</div>

<div class="col-lg-10 p-4">

<h3 class="mb-4">
Riwayat Tidur
</h3>

<div class="card card-box p-4">

<table class="table table-striped">

<thead>

<tr>

<th>Tanggal</th>
<th>Jam Tidur</th>
<th>Jam Bangun</th>
<th>Kualitas</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

</div>

</div>

<div
class="modal fade"
id="detailModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Detail Tidur
</h5>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<p>
<b>Tanggal:</b>
<span id="mTanggal"></span>
</p>

<p>
<b>Jam Tidur:</b>
<span id="mJamTidur"></span>
</p>

<p>
<b>Jam Bangun:</b>
<span id="mJamBangun"></span>
</p>

<p>
<b>Kualitas:</b>
<span id="mKualitas"></span>
%
</p>

<p>
<b>Catatan:</b>
<span id="mCatatan"></span>
</p>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Mengambil identitas user aktif untuk mengambil database lokal yang sesuai
const user =
localStorage.getItem("somnioUser");

// Mengambil array riwayat dari LocalStorage, jika belum ada setel sebagai array kosong []
let dataTidur =
JSON.parse(
localStorage.getItem(`sleepData_${user}`)
) || [];

const tbody =
document.getElementById("tableBody");

/* FUNGSI: MERENDER DATA TIDUR KE DALAM ELEMEN TABEL HTML */
function tampilkanData(){

// Membersihkan isi tabel terlebih dahulu agar tidak terjadi duplikasi data saat di-refresh
tbody.innerHTML = "";

// Melakukan perulangan untuk setiap baris data yang ada di dalam array riwayat
dataTidur.forEach((item,index)=>{

// Menyisipkan baris HTML baru secara dinamis ke dalam elemen <tbody>
tbody.innerHTML += `

<tr>

<td>${item.tanggal}</td>

<td>${item.jamTidur}</td>

<td>${item.jamBangun}</td>

<td>${item.kualitas}%</td>

<td>

<button
class="btn btn-primary btn-sm"
onclick="lihatData(${index})">

Lihat

</button>

<button
class="btn btn-danger btn-sm"
onclick="hapusData(${index})">

Hapus

</button>

</td>

</tr>

`;

});

}

/* FUNGSI: MEMBUKA MODAL DAN MENYUNTIKKAN DATA RINCIAN SESUAI INDEX */
function lihatData(index){

// Menangkap objek data tidur yang dipilih berdasarkan nomor index array-nya
const item = dataTidur[index];

// Mengisi konten teks element modal berdasarkan isi objek data riwayat tidur
document.getElementById("mTanggal")
.innerHTML = item.tanggal;

document.getElementById("mJamTidur")
.innerHTML = item.jamTidur;

document.getElementById("mJamBangun")
.innerHTML = item.jamBangun;

document.getElementById("mKualitas")
.innerHTML = item.kualitas;

document.getElementById("mCatatan")
.innerHTML = item.catatan;

// Melakukan instansiasi objek modal Bootstrap baru kemudian menampilkannya ke layar
new bootstrap.Modal(
document.getElementById("detailModal")
).show();

}

/* FUNGSI: MENGHAPUS DATA DARI ARRAY DAN MEMPERBARUI DATABASE LOKAL */
function hapusData(index){

// Memunculkan kotak konfirmasi sebelum proses penghapusan dilakukan
if(confirm("Hapus data ini?")){

// Menghapus data dari array berdasarkan index baris sebanyak 1 elemen
dataTidur.splice(index,1);

// Menyimpan kembali kondisi array terbaru ke LocalStorage dalam bentuk teks JSON
localStorage.setItem(
`sleepData_${user}`,
JSON.stringify(dataTidur)
);

// Memuat ulang tampilan tabel di halaman agar sesuai dengan perubahan data terbaru
tampilkanData();

}

}

// Memanggil fungsi tampilkanData secara otomatis saat halaman pertama kali dibuka
tampilkanData();

</script>
<script src="js/script.js"></script>

</body>
</html>
